<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="46%" r="80%">
      <stop offset="0%" stop-color="#0c0c17"/>
      <stop offset="55%" stop-color="#07070e"/>
      <stop offset="100%" stop-color="#030305"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6f5ad0" stop-opacity="0.30"/>
      <stop offset="40%" stop-color="#4a3c92" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4a3c92" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- faint core -->
  <ellipse cx="600" cy="150" rx="380" ry="150" fill="url(#core)">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="9s" repeatCount="indefinite"/>
  </ellipse>

  <!-- faint stars -->
  <g fill="#cfd4ee">
    <circle cx="70" cy="58" r="1"><animate attributeName="opacity" values="0.08;0.5;0.08" dur="5.0s" begin="0.0s" repeatCount="indefinite"/></circle>
    <circle cx="232" cy="64" r="1.1"><animate attributeName="opacity" values="0.08;0.6;0.08" dur="4.4s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="430" cy="252" r="1"><animate attributeName="opacity" values="0.08;0.5;0.08" dur="5.6s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="715" cy="262" r="1.2"><animate attributeName="opacity" values="0.08;0.6;0.08" dur="4.1s" begin="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="956" cy="56" r="1"><animate attributeName="opacity" values="0.08;0.5;0.08" dur="5.2s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="1128" cy="70" r="1.1"><animate attributeName="opacity" values="0.08;0.6;0.08" dur="4.7s" begin="3.0s" repeatCount="indefinite"/></circle>
    <circle cx="58" cy="246" r="1"><animate attributeName="opacity" values="0.08;0.5;0.08" dur="5.3s" begin="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="1162" cy="236" r="1.1"><animate attributeName="opacity" values="0.08;0.55;0.08" dur="4.9s" begin="1.1s" repeatCount="indefinite"/></circle>
  </g>

  <!-- network edges -->
  <g stroke="#34355f" stroke-width="1" opacity="0.5" fill="none">
    <line x1="160" y1="110" x2="285" y2="150"/>
    <line x1="160" y1="110" x2="115" y2="205"/>
    <line x1="115" y1="205" x2="285" y2="150"/>
    <line x1="285" y1="150" x2="370" y2="85"/>
    <line x1="285" y1="150" x2="455" y2="205"/>
    <line x1="370" y1="85" x2="565" y2="125"/>
    <line x1="455" y1="205" x2="565" y2="125"/>
    <line x1="455" y1="205" x2="520" y2="255"/>
    <line x1="565" y1="125" x2="665" y2="195"/>
    <line x1="565" y1="125" x2="765" y2="95"/>
    <line x1="520" y1="255" x2="665" y2="195"/>
    <line x1="665" y1="195" x2="905" y2="145"/>
    <line x1="765" y1="95" x2="905" y2="145"/>
    <line x1="765" y1="95" x2="1025" y2="105"/>
    <line x1="845" y1="215" x2="665" y2="195"/>
    <line x1="845" y1="215" x2="905" y2="145"/>
    <line x1="905" y1="145" x2="1085" y2="215"/>
    <line x1="905" y1="145" x2="1145" y2="150"/>
    <line x1="1025" y1="105" x2="1145" y2="150"/>
  </g>

  <!-- traveling signal pulses -->
  <g fill="#eef2ff">
    <circle r="2.3"><animateMotion dur="4.2s" repeatCount="indefinite" path="M160,110 L285,150"/><animate attributeName="opacity" values="0;1;0" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle r="2.3"><animateMotion dur="4.8s" begin="1.4s" repeatCount="indefinite" path="M565,125 L765,95"/><animate attributeName="opacity" values="0;1;0" dur="4.8s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle r="2.3"><animateMotion dur="5.4s" begin="2.4s" repeatCount="indefinite" path="M905,145 L1145,150"/><animate attributeName="opacity" values="0;1;0" dur="5.4s" begin="2.4s" repeatCount="indefinite"/></circle>
    <circle r="2.1"><animateMotion dur="4.6s" begin="0.7s" repeatCount="indefinite" path="M285,150 L455,205"/><animate attributeName="opacity" values="0;1;0" dur="4.6s" begin="0.7s" repeatCount="indefinite"/></circle>
  </g>

  <!-- nodes -->
  <g filter="url(#glow)">
    <circle cx="160" cy="110" r="3.3" fill="#bcc6ff"><animate attributeName="opacity" values="0.45;0.95;0.45" dur="4.0s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="115" cy="205" r="2.3" fill="#97a8ee"><animate attributeName="opacity" values="0.35;0.85;0.35" dur="4.6s" begin="1.0s" repeatCount="indefinite"/></circle>
    <circle cx="285" cy="150" r="4.0" fill="#d0d7ff"><animate attributeName="opacity" values="0.55;1;0.55" dur="3.6s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="370" cy="85" r="2.4" fill="#97a8ee"><animate attributeName="opacity" values="0.35;0.85;0.35" dur="5.0s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="455" cy="205" r="3.1" fill="#bcc6ff"><animate attributeName="opacity" values="0.45;0.95;0.45" dur="4.2s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="255" r="2.3" fill="#97a8ee"><animate attributeName="opacity" values="0.35;0.8;0.35" dur="4.8s" begin="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="565" cy="125" r="4.3" fill="#dde2ff"><animate attributeName="opacity" values="0.55;1;0.55" dur="3.4s" begin="0.0s" repeatCount="indefinite"/></circle>
    <circle cx="665" cy="195" r="3.1" fill="#bcc6ff"><animate attributeName="opacity" values="0.45;0.95;0.45" dur="4.1s" begin="1.3s" repeatCount="indefinite"/></circle>
    <circle cx="765" cy="95" r="3.9" fill="#d0d7ff"><animate attributeName="opacity" values="0.55;1;0.55" dur="3.8s" begin="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="845" cy="215" r="2.4" fill="#97a8ee"><animate attributeName="opacity" values="0.35;0.85;0.35" dur="5.1s" begin="2.0s" repeatCount="indefinite"/></circle>
    <circle cx="905" cy="145" r="4.1" fill="#dde2ff"><animate attributeName="opacity" values="0.55;1;0.55" dur="3.5s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="1025" cy="105" r="2.9" fill="#bcc6ff"><animate attributeName="opacity" values="0.45;0.95;0.45" dur="4.4s" begin="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="1085" cy="215" r="2.3" fill="#97a8ee"><animate attributeName="opacity" values="0.35;0.8;0.35" dur="4.9s" begin="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="1145" cy="150" r="3.2" fill="#bcc6ff"><animate attributeName="opacity" values="0.45;0.95;0.45" dur="4.0s" begin="1.4s" repeatCount="indefinite"/></circle>
  </g>
</svg>
